# ============================================
# Server
# ============================================
server.port=${PORT:8080}

# ============================================
# PostgreSQL (Railway injects these variables)
# ============================================
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:railway}?sslmode=require
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool for cloud DB
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:5}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================
# JPA
# ============================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================
# Flyway
# ============================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ============================================
# Redis (Railway injects these variables)
# ============================================
spring.data.redis.host=${REDISHOST:localhost}
spring.data.redis.port=${REDISPORT:6379}
spring.data.redis.password=${REDISPASSWORD:}
spring.data.redis.timeout=5000
spring.data.redis.connect-timeout=5000

# ============================================
# Jackson
# ============================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ============================================
# Actuator
# ============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ============================================
# Logging
# ============================================
logging.level.com.warzone=INFO
logging.level.org.springframework.web.socket=INFO
logging.level.org.flywaydb=INFO
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================
# GDELT Polling (15 minutes)
# ============================================
app.gdelt.poll-interval=900000
app.gdelt.base-url=https://api.gdeltproject.org/api/v2/doc/doc

# ============================================
# Risk Calculation (5 minutes)
# ============================================
app.risk.calc-interval=300000
